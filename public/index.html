<!DOCTYPE html>
<html lang="en">

<head>

  <!-- ================= BASIC META ================= -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0d6efd" />

  <!-- ================= PRIMARY SEO ================= -->
  <title>ShopX | Buy Fashion, Electronics & Accessories Online</title>

  <meta name="description"
    content="ShopX is a modern online shopping platform where you can buy fashion, electronics, accessories and more at the best prices with fast delivery." />

  <meta name="keywords"
    content="ShopX, online shopping India, buy fashion online, electronics store, accessories shop, ecommerce website, best online store" />

  <meta name="author" content="ShopX" />

  <!-- Search Engine Control -->
  <meta name="robots" content="index, follow" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://shop-x-red.vercel.app/" />

  <!-- ================= FAVICON ================= -->
  <link rel="icon" href="%PUBLIC_URL%/Logo.png" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/Logo.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- ================= PERFORMANCE ================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- ================= OPEN GRAPH ================= -->
  <meta property="og:title" content="ShopX | Online Shopping Store" />
  <meta property="og:description"
    content="Discover the best deals on fashion, electronics and accessories at ShopX." />
  <meta property="og:image" content="https://shop-x-red.vercel.app/logo.png" />
  <meta property="og:url" content="https://shop-x-red.vercel.app/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ShopX" />

  <!-- ================= TWITTER CARD ================= -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ShopX | Modern Online Shopping Platform" />
  <meta name="twitter:description"
    content="Shop fashion, electronics and accessories online with secure checkout and fast delivery." />
  <meta name="twitter:image" content="https://shop-x-red.vercel.app/logo.png" />

  <!-- ================= STRUCTURED DATA ================= -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Store",
    "name": "ShopX",
    "url": "https://shop-x-red.vercel.app/",
    "logo": "https://shop-x-red.vercel.app/logo.png",
    "description": "ShopX is an online store for fashion, electronics, accessories and more.",
    "sameAs": [
      "https://instagram.com/",
      "https://facebook.com/",
      "https://twitter.com/"
    ]
  }
  </script>

</head>

<body>

  <div id="root"></div>

</body>

</html>
