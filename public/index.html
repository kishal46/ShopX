<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary Meta Tags -->
    <title>ShopX | Modern Online Shopping Platform</title>
    <meta name="title" content="ShopX | Modern Online Shopping Platform" />
    <meta
      name="description"
      content="ShopX is a modern e-commerce platform offering quality products with secure payments and fast delivery."
    />
    <meta name="keywords" content="shopx, ecommerce, online shopping, buy products, secure payment" />
    <meta name="author" content="ShopX Team" />
    <meta name="theme-color" content="#0d6efd" />

    <!-- Favicon -->
    <link rel="icon" href="https://images.yourstory.com/cs/images/companies/shopX-1588758723879.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ShopX | Modern Online Shopping Platform" />
    <meta
      property="og:description"
      content="Discover amazing products at the best prices. Fast delivery and secure checkout with ShopX."
    />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:url" content="https://yourdomain.com/" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="ShopX | Modern Online Shopping Platform" />
    <meta
      property="twitter:description"
      content="Shop premium products online with secure payment and fast delivery."
    />
    <meta property="twitter:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- Performance Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Example Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

  </head>

  <body>
    <noscript>
      <strong>
        JavaScript is required to run this application. Please enable it in your browser.
      </strong>
    </noscript>

    <div id="root"></div>
  </body>
</html>
