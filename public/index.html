<head>
  <!-- Basic Setup -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- SEO -->
  <title>ShopX | Buy Fashion, Electronics & More Online</title>
  <meta name="description" content="ShopX is your trusted online shopping destination for fashion, electronics, accessories and more. Secure payments, fast delivery and best prices guaranteed." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="ShopX" />
  <meta name="theme-color" content="#0d6efd" />

  <!-- Canonical -->
  <link rel="canonical" href="https://yourdomain.com/" />

  <!-- Favicon -->
  <link rel="icon" href="https://images.yourstory.com/cs/images/companies/shopX-1588758723879.png" />
  <link rel="apple-touch-icon" href="/logo192.png" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ShopX" />
  <meta property="og:title" content="ShopX | Smart Online Shopping Store" />
  <meta property="og:description" content="Explore trending fashion, electronics and daily essentials at unbeatable prices with fast delivery and secure checkout." />
  <meta property="og:image" content="/logo512.png" />
  <meta property="og:url" content="https://yourdomain.com/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ShopX | Smart Online Shopping" />
  <meta name="twitter:description" content="Buy top quality products online with fast shipping and secure payments." />
  <meta name="twitter:image" content="/logo512.png" />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
