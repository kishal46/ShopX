<head>
  <!-- Basic -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- SEO Title (60 characters max ideal) -->
  <title>ShopX – Buy Fashion, Electronics & More Online</title>

  <!-- SEO Meta Description (150-160 characters ideal) -->
  <meta
    name="description"
    content="ShopX is your trusted online shopping destination for fashion, electronics, accessories and more. Secure payments, fast delivery & best prices guaranteed."
  />

  <!-- Keywords (not very powerful for Google, but still useful) -->
  <meta
    name="keywords"
    content="shopx online shopping, buy fashion online, electronics store, ecommerce website india, secure payment shopping, best online deals"
  />

  <meta name="author" content="ShopX" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0d6efd" />

  <!-- Canonical URL (IMPORTANT for SEO) -->
  <link rel="canonical" href="https://yourdomain.com/" />

  <!-- Favicon -->
  <link rel="icon" href="https://images.yourstory.com/cs/images/companies/shopX-1588758723879.png" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

  <!-- Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Open Graph (Facebook / WhatsApp / LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ShopX" />
  <meta property="og:title" content="ShopX – India’s Smart Online Shopping Store" />
  <meta
    property="og:description"
    content="Explore trending fashion, electronics and daily essentials at unbeatable prices. Fast delivery & secure checkout only on ShopX."
  />
  <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
  <meta property="og:url" content="https://yourdomain.com/" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ShopX – Smart Online Shopping" />
  <meta
    name="twitter:description"
    content="Buy top quality products online with fast shipping and secure payments."
  />
  <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>
